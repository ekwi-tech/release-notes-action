# git-cliff configuration — https://git-cliff.org/docs/configuration
# Canonical release-note config for the ekwi-tech fleet. Shipped inside release-notes-action and used by every
# consumer through it — there is intentionally NO per-repo copy of this file anywhere else.
#
# Repo-agnostic by construction: nothing here names a repository.
#   - the commit URL is built from GITHUB_REPOSITORY via get_env (always set by the Actions runtime);
#   - PR-author / contributor enrichment is activated by the action passing `--github-repo <owner/repo>`,
#     which is why there is no [remote.github] section to carry an owner/repo.
#
# Invocation (done by the action, not by a consumer):
#   git-cliff --github-repo <owner/repo> --unreleased --tag vX.Y.Z --strip all
[changelog]
header = """
# Changelog

Generated by git-cliff from Conventional Commits at release time. Do not edit by hand — the next release
overwrites it.
"""
# --strip all drops this header, leaving the version section alone. The `## [X.Y.Z] — date` line it keeps is
# not noise: it dates the release, which the GitHub Release page does not.
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}

{% for commit in commits %}\
- {% if commit.breaking %}**BREAKING** {% endif %}{{ commit.message | upper_first }}\
{% if commit.remote.username %} by @{{ commit.remote.username }}{% endif %} \
{% if commit.remote.pr_number %}in (#{{ commit.remote.pr_number }} - {% else %}({% endif %}[`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/{{ get_env(name="GITHUB_REPOSITORY", default="") }}/commit/{{ commit.id }}))
{% endfor %}
{% endfor %}\
{% if github %}\
{% set first_timers = github.contributors | filter(attribute="is_first_time", value=true) %}\
{% if first_timers | length > 0 %}
### New Contributors

{% for c in first_timers %}\
- @{{ c.username }} made their first contribution{% if c.pr_number %} in #{{ c.pr_number }}{% endif %}
{% endfor %}\
{% endif %}\
{% endif %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# Neutralise free-text @-mentions leaking from a commit subject: an annotation like `@readonly` is not a
# person, but GitHub linkifies it into a phantom "Contributor". A code span suppresses that — GitHub never
# resolves mentions inside code spans. Message-scoped so the structured PR author (commit.remote.username,
# injected by the template outside the message) stays a real mention. Then strip the " (#N)" GitHub appends to
# a squash-merge subject, so the body re-renders the PR number once, in "in (#N - ...)"; (?m) anchors to
# end-of-LINE because a preprocessor sees the raw full message, where the subject's (#N) is not at end-of-string.
commit_preprocessors = [
  { pattern = '(^|[^`])@([A-Za-z0-9_-]+)', replace = '${1}`@${2}`' },
  { pattern = '(?m) \(#[0-9]+\)$', replace = '' },
]
commit_parsers = [
  { message = "^feat",     group = "Features"      },
  { message = "^fix",      group = "Bug Fixes"      },
  { message = "^perf",     group = "Performance"    },
  { message = "^refactor", group = "Refactoring"    },
  { message = "^docs|^style|^test|^chore|^ci|^build", skip = true },
]
protect_breaking_commits = true
filter_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
