name: Semantic Checks

# Enforces a Conventional-Commit PR title by calling the fleet's shared reusable — the action pin and the ten-type
# vocabulary live once in release-workflow, adopted here by bumping the pinned SHA (Dependabot tracks it).
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions: {}

jobs:
  title:
    name: PR title
    # The caller grants the token scope; the reusable reads the PR title via the automatic GITHUB_TOKEN. Resulting
    # check: "Semantic Checks / PR title / Conventional Commits on PR Title".
    permissions:
      pull-requests: read
    uses: ekwi-tech/release-workflow/.github/workflows/commitlint-reusable.yml@3a747dc7143a2179cedec8f606cf2c9ec7b55d12 # v0.1.0
