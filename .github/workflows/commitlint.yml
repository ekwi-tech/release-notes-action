name: Conventional Commit PR Title

# Enforces a Conventional-Commit PR title by calling the fleet's shared reusable — the action pin and the ten-type
# vocabulary live once in release-workflow, adopted here by bumping the pinned SHA (Dependabot tracks it).
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions: {}

jobs:
  title:
    # The caller grants the token scope; the reusable reads the PR title via the automatic GITHUB_TOKEN. Resulting
    # check: "Conventional Commit PR Title / title / Enforce Conventional Commits format on PR title".
    permissions:
      pull-requests: read
    uses: ekwi-tech/release-workflow/.github/workflows/commitlint-reusable.yml@a0eb3f966bc937bde758e746df16996254b4d7b6 # v0.1.0
