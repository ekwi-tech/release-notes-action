name: Semantic PR Title

# The version this action ships is DERIVED from the Conventional Commits on main (via next-version-action). So
# an unparseable subject is not a style problem, it is a correctness one, and it fails SILENTLY: a `feat` merged
# as "add the thing" is read as a patch. cliff.toml drops it from the notes on the same grounds.
#
# Squash-merge makes the PR title the commit subject verbatim, so validating the title validates the commit.
# Make this a REQUIRED check in a ruleset on this repo to give it teeth.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate-pr-title:
    name: Enforce Conventional Commits format on PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # The same ten types as the rest of the ecosystem — one vocabulary everywhere. Mirrors the
          # commit_parsers in this repo's cliff.toml (the one the action ships).
          types: |
            feat
            fix
            perf
            refactor
            build
            chore
            ci
            docs
            style
            test
          requireScope: false
